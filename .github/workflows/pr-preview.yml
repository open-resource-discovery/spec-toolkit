name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  pr-preview:
    permissions:
      contents: read
      actions: write
      pull-requests: read

    runs-on: ubuntu-latest

    concurrency:
      group: preview-${{ github.repository }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build preview
        if: github.event.action != 'closed'
        working-directory: website
        env:
          PR_PREVIEW_NUMBER: ${{ github.event.pull_request.number }}
          BASE_URL: /pr-preview/spec-toolkit/pr-${{ github.event.pull_request.number }}/
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: PR preview
        uses: open-resource-discovery/pr-preview-action@fix/artifact-upload-ghes-github-compat
        with:
          fork: true
          build-dir: website/build
          target-repo: open-resource-discovery/pr-preview
          pages-base-url: https://open-resource-discovery.github.io/pr-preview
          umbrella-dir: spec-toolkit
          token: ${{ secrets.PR_PREVIEW_TOKEN }}
